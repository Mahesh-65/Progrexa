version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: prorexa-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  auth-service:
    build: ./auth-service
    container_name: prorexa-auth-service
    env_file:
      - ./auth-service/.env
    ports:
      - "8001:8000"
    depends_on:
      - mongodb

  user-service:
    build: ./user-service
    container_name: prorexa-user-service
    env_file:
      - ./user-service/.env
    ports:
      - "8002:8000"
    depends_on:
      - mongodb

  task-service:
    build: ./task-service
    container_name: prorexa-task-service
    env_file:
      - ./task-service/.env
    ports:
      - "8003:8000"
    depends_on:
      - mongodb

  schedule-service:
    build: ./schedule-service
    container_name: prorexa-schedule-service
    env_file:
      - ./schedule-service/.env
    ports:
      - "8004:8000"
    depends_on:
      - mongodb

  time-tracker-service:
    build: ./time-tracker-service
    container_name: prorexa-time-tracker-service
    env_file:
      - ./time-tracker-service/.env
    ports:
      - "8005:8000"
    depends_on:
      - mongodb

  analytics-service:
    build: ./analytics-service
    container_name: prorexa-analytics-service
    env_file:
      - ./analytics-service/.env
    ports:
      - "8006:8000"
    depends_on:
      - mongodb

  notification-service:
    build: ./notification-service
    container_name: prorexa-notification-service
    env_file:
      - ./notification-service/.env
    ports:
      - "8007:8000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: prorexa-frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - user-service
      - task-service
      - schedule-service
      - time-tracker-service
      - analytics-service
      - notification-service

volumes:
  mongo_data:
